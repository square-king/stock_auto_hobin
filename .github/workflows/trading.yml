name: Stock Auto Trading

on:
  schedule:
    # KST = UTC + 9
    # 09:01 KST → 00:01 UTC (매수 실행)
    - cron: '1 0 * * 1-5'
    # 장중 청산 체크: 09:10~14:50 KST → 00:10~05:50 UTC (10분 간격)
    # hour 0은 10분부터 (morning_buy 00:01과 겹침 방지)
    - cron: '10,20,30,40,50 0 * * 1-5'
    - cron: '*/10 1-5 * * 1-5'
    # 15:35 KST → 06:35 UTC (스크리닝)
    - cron: '35 6 * * 1-5'
    # 15:45 KST → 06:45 UTC (일일 리포트)
    - cron: '45 6 * * 1-5'
    # 주말 keepalive — cron 스케줄 sync 유지 (토/일 21:00 KST → 12:00 UTC)
    - cron: '0 12 * * 0,6'
  workflow_dispatch:
    inputs:
      task:
        description: '실행할 태스크'
        required: false
        default: 'exit_check'
        type: choice
        options:
          - morning_buy
          - exit_check
          - scan
          - report

env:
  TZ: Asia/Seoul

permissions:
  contents: write

jobs:
  # 주말 keepalive — Python 설치 없이 빠르게 끝남 (Actions 시간 절약)
  keepalive:
    if: github.event.schedule == '0 12 * * 0,6'
    runs-on: ubuntu-latest
    steps:
      - run: echo "keepalive $(TZ=Asia/Seoul date '+%Y-%m-%d %H:%M:%S')"

  trading:
    if: github.event.schedule != '0 12 * * 0,6' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Determine task
        id: task
        run: |
          # 수동 실행인 경우
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "task=${{ github.event.inputs.task }}" >> $GITHUB_OUTPUT
            echo "수동 실행: ${{ github.event.inputs.task }}"
            exit 0
          fi

          # cron 스케줄로 태스크 결정 (시간 지연에 영향 안 받음)
          SCHEDULE="${{ github.event.schedule }}"
          echo "트리거된 cron: $SCHEDULE"

          if [ "$SCHEDULE" = "1 0 * * 1-5" ]; then
            echo "task=morning_buy" >> $GITHUB_OUTPUT
          elif [ "$SCHEDULE" = "35 6 * * 1-5" ]; then
            echo "task=scan" >> $GITHUB_OUTPUT
          elif [ "$SCHEDULE" = "45 6 * * 1-5" ]; then
            echo "task=report" >> $GITHUB_OUTPUT
          else
            echo "task=exit_check" >> $GITHUB_OUTPUT
          fi

      - name: Create env file
        run: |
          cat << EOF > .env
          KIS_APP_KEY=${{ secrets.KIS_APP_KEY }}
          KIS_APP_SECRET=${{ secrets.KIS_APP_SECRET }}
          KIS_ACCOUNT_NO=${{ secrets.KIS_ACCOUNT_NO }}
          KIS_IS_PAPER=${{ secrets.KIS_IS_PAPER }}
          KAKAO_REST_API_KEY=${{ secrets.KAKAO_REST_API_KEY }}
          KAKAO_ACCESS_TOKEN=${{ secrets.KAKAO_ACCESS_TOKEN }}
          KAKAO_REFRESH_TOKEN=${{ secrets.KAKAO_REFRESH_TOKEN }}
          EOF

      - name: Run task
        run: |
          echo "실행 태스크: ${{ steps.task.outputs.task }}"
          echo "현재 KST: $(TZ=Asia/Seoul date '+%Y-%m-%d %H:%M:%S')"
          python run_task.py ${{ steps.task.outputs.task }}

      - name: Save state
        run: |
          echo "=== State files ==="
          ls -la logs/*.json 2>/dev/null || echo "no log files"
          cat logs/positions.json 2>/dev/null || echo "no positions.json"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add logs/pending_signals.json logs/positions.json logs/trades.json 2>/dev/null || true
          git diff --staged --quiet || git commit -m "state: $(TZ=Asia/Seoul date '+%m/%d %H:%M') ${{ steps.task.outputs.task }}"
          git push || true
