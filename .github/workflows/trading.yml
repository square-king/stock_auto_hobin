name: Stock Auto Trading

on:
  schedule:
    # KST = UTC + 9
    # 09:01 KST → 00:01 UTC (매수 실행)
    - cron: '1 0 * * 1-5'
    # 장중 청산 체크: 09:10~15:20 KST → 00:10~06:20 UTC (10분 간격)
    - cron: '*/10 0-6 * * 1-5'
    # 15:35 KST → 06:35 UTC (스크리닝)
    - cron: '35 6 * * 1-5'
    # 15:40 KST → 06:40 UTC (일일 리포트)
    - cron: '40 6 * * 1-5'
  workflow_dispatch:  # 수동 실행 가능

env:
  TZ: Asia/Seoul

jobs:
  trading:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Determine task
        id: task
        run: |
          HOUR_KST=$(TZ=Asia/Seoul date +%H)
          MIN_KST=$(TZ=Asia/Seoul date +%M)
          echo "현재 KST: ${HOUR_KST}:${MIN_KST}"

          if [ "$HOUR_KST" = "15" ] && [ "$MIN_KST" -ge 38 ]; then
            echo "task=report" >> $GITHUB_OUTPUT
          elif [ "$HOUR_KST" = "15" ] && [ "$MIN_KST" -ge 30 ]; then
            echo "task=scan" >> $GITHUB_OUTPUT
          elif [ "$HOUR_KST" = "09" ] && [ "$MIN_KST" -le 5 ]; then
            echo "task=morning_buy" >> $GITHUB_OUTPUT
          else
            echo "task=exit_check" >> $GITHUB_OUTPUT
          fi

      - name: Create env file
        run: |
          cat << EOF > .env
          KIS_APP_KEY=${{ secrets.KIS_APP_KEY }}
          KIS_APP_SECRET=${{ secrets.KIS_APP_SECRET }}
          KIS_ACCOUNT_NO=${{ secrets.KIS_ACCOUNT_NO }}
          KIS_IS_PAPER=${{ secrets.KIS_IS_PAPER }}
          KAKAO_REST_API_KEY=${{ secrets.KAKAO_REST_API_KEY }}
          KAKAO_ACCESS_TOKEN=${{ secrets.KAKAO_ACCESS_TOKEN }}
          EOF

      - name: Run task
        run: python run_task.py ${{ steps.task.outputs.task }}

      - name: Save state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add logs/pending_signals.json logs/positions.json logs/trades.json 2>/dev/null || true
          git diff --staged --quiet || git commit -m "state: $(TZ=Asia/Seoul date '+%m/%d %H:%M') ${{ steps.task.outputs.task }}"
          git push || true
